name: build docker image
on:
  workflow_call:
jobs:
  build-push:
    runs-on: linux-amd64
    container:
      image: node:lts-alpine
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /root/.containermanagers:/root/.containermanagers
        - /etc/containers/registries.conf:/etc/containers/registries.conf:ro
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup docker cli in the builder container
        run: |
          apk update && apk add --no-cache docker-cli
      - name: Log in to Forgejo Container Registry
        run: |
          REGISTRY="${{ env.FORGEJO_REGISTRY }}"
          if [ -z "$REGISTRY" ]; then
            # Extract domain/host safely from server URL context as a definitive backup
            REGISTRY=$(echo "${{ env.FORGEJO_SERVER_URL }}" | sed -e 's|^http://||' -e 's|^https://||')
          fi
          echo "Target Registry Host Determined As: $REGISTRY"
          echo "REGISTRY_HOST=$REGISTRY" >> $FORGEJO_ENV
          echo "${{ env.FORGEJO_TOKEN }}" | docker login $REGISTRY -u "${{ env.FORGEJO_ACTOR }}" --password-stdin
          echo "Login Registry $REGISTRY with actor ${{ env.FORGEJO_ACTOR }}"
      - name: Build and Push Docker Image
        run: |
          echo "Using tag: $CLEAN_TAG"
          REPO_LOWER=$(echo "${{ env.FORGEJO_REPOSITORY }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PATH="$REGISTRY_HOST/$REPO_LOWER"
          docker build -t $IMAGE_PATH:$CLEAN_TAG -t $IMAGE_PATH:latest .
          echo "Docker image built with tags: $IMAGE_PATH:$CLEAN_TAG and $IMAGE_PATH:latest"
          docker push $IMAGE_PATH:$CLEAN_TAG
          docker push $IMAGE_PATH:latest
          echo "Docker images pushed successfully to $REGISTRY_HOST"