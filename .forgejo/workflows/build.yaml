name: build docker image

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
jobs:
  build-push:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure Local HTTP Registry
        run: |
          REGISTRY_HOST=$(echo "${{ env.FORGEJO_SERVER_URL }}" | sed -e 's|^http://||' -e 's|^https://||')
          echo "REGISTRY_HOST=$REGISTRY_HOST" >> $FORGEJO_ENV
          sudo mkdir -p /etc/docker
          echo "{\"insecure-registries\": [\"$REGISTRY_HOST\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Log in to Forgejo Container Registry
        run: |
          echo "${{ env.FORGEJO_TOKEN }}" | docker login $REGISTRY_HOST -u ${{ FORGEJO_ACTOR }} --password-stdin
      - name: Build and Push Docker Image
        run: |
          CLEAN_TAG=${{ inputs.tag_name }}
          REPO_LOWER=$(echo "${{ env.FORGEJO_REPOSITORY }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PATH="$REGISTRY_HOST/$REPO_LOWER"
          docker build -t $IMAGE_PATH:$CLEAN_TAG -t $IMAGE_PATH:latest .
          # Standard image push steps over insecure connection channel
          docker push $IMAGE_PATH:$CLEAN_TAG
          docker push $IMAGE_PATH:latest
  trigger-deploy:
    needs: build-push
    uses: ./forgejo/workflows/deploy.yaml
    secrets: inherit