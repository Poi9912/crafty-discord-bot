name: build docker image
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
jobs:
  build-push:
    runs-on: linux-amd64
    container:
      image: quay.io/podman/stable
      # options: --privileged --device /dev/fuse
    steps:
      - run: |
          echo "prepare build environment"
          dnf install -y node git skopeo
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}
          ref: ${{ inputs.tag }}
      - name: Obtain Forgejo Container Registry
        run: |
          REGISTRY="${{ env.FORGEJO_REGISTRY }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY=$(echo "${{ env.FORGEJO_SERVER_URL }}" | sed -e 's|^http://||' -e 's|^https://||')
          fi
          echo "Target Registry Host Determined As: $REGISTRY"
          echo "REGISTRY_HOST=$REGISTRY" >> $FORGEJO_ENV
          echo "Clearing out conflicting storage caches..."
          rm -rf /var/lib/containers/storage/*
          mkdir -p /etc/containers
          cat <<EOF > /etc/containers/storage.conf
          [storage]
          driver = "vfs"
          runroot = "/run/containers/storage"
          graphroot = "/var/lib/containers/storage"
          EOF
          rm -rf /var/lib/containers/storage/*
      - name: Build and Push Docker Image
        run: |
          CLEAN_TAG="${{ inputs.tag }}"
          REGISTRY="${{ env.FORGEJO_REGISTRY }}"
          [ -z "$REGISTRY" ] && REGISTRY=$(echo "${{ env.FORGEJO_SERVER_URL }}" | sed -e 's|^http://||' -e 's|^https://||')
          REPO_LOWER=$(echo "${{ env.FORGEJO_REPOSITORY }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PATH="$REGISTRY/$REPO_LOWER"
          mkdir -p /etc/containers
          cat <<EOF > /etc/containers/registries.conf
          [[registry]]
          location = "$REGISTRY"
          insecure = true
          EOF
          echo "Initiating user-space compilation via isolated Chroot..."
          podman --storage-driver=vfs build --isolation=chroot -t $IMAGE_PATH:$CLEAN_TAG -t $IMAGE_PATH:latest .
          podman --storage-driver=vfs images
          echo "Syncing layers to registry via skopeo..."
          skopeo copy --dest-tls-verify=false \
            --dest-creds "${{ secrets.OWNER_REGISTRY_USER }}:${{ secrets.OWNER_REGISTRY_TOKEN }}" \
            containers-storage:$IMAGE_PATH:$CLEAN_TAG \
            docker://$IMAGE_PATH:$CLEAN_TAG
          skopeo copy --dest-tls-verify=false \
            --dest-creds "${{ secrets.OWNER_REGISTRY_USER }}:${{ secrets.OWNER_REGISTRY_TOKEN }}" \
            containers-storage:$IMAGE_PATH:latest \
            docker://$IMAGE_PATH:latest
          echo "Images successfully pushed using skopeo."