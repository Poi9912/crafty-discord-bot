name: tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: docker
    container:
      image: node:lts-alpine
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
  trigger-version-bump:
    needs: test
    if: forgejo.event_name == 'push' && forgejo.ref == 'refs/heads/main'
    uses: ./.forgejo/workflows/version.yaml
    secrets: inherit