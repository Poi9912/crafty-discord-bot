name: main-workflow
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  tests:
    uses: ./.forgejo/workflows/tests.yaml
    secrets: inherit
  version-bump:
    needs: tests
    if: env.FORGEJO_EVENT_NAME == 'push' && env.FORGEJO_HEAD_REF == 'refs/heads/main'
    uses: ./.forgejo/workflows/version.yaml
    secrets: inherit
  build:
    needs: version-bump
    uses: ./.forgejo/workflows/build.yaml
    secrets: inherit
  deploy:
    needs: build
    uses: ./.forgejo/workflows/deploy.yaml
    secrets: inherit