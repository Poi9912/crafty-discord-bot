name: version
on:
  workflow_call:
jobs:
  bump-version:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Next tag
        id: create_tag
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Current latest tag: $LATEST_TAG"
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          echo "New tag: $NEW_TAG"
          git config user.name "Curiosity Bot"
          git config user.email "curiosity@letf.local"
          echo "Will tag the latest commit with: $NEW_TAG"
          git tag $NEW_TAG
          git push origin $NEW_TAG
          echo "CLEAN_TAG=$NEW_TAG" >> $FORGEJO_OUTPUT
          echo "New tag $NEW_TAG created and pushed to origin."