name: version
on:
  workflow_call:
jobs:
  bump-version:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Next tag
        id: create_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "Current latest tag: $LATEST_TAG"
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $FORGEJO_OUTPUT
      - name: Push new tag
        run: |
          git config user.name "Curiosity Bot"
          git config user.email "curiosity@letf.local"
          echo "Will tag the latest commit with: ${{ steps.bump-version.outputs.new_tag }}"
          git tag ${{ steps.bump-version.outputs.new_tag }}
          git push origin ${{ steps.bump-version.outputs.new_tag }}